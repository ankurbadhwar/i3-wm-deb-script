# =============================================================================
# Picom — Compositor Configuration
# =============================================================================
# Backend: glx (hardware-accelerated). If you have GPU issues, change to "xrender".
# Called from: i3/autostart.conf
#   exec_always --no-startup-id picom --config ~/.config/picom/picom.conf &
#
# Docs: man picom | https://github.com/yshui/picom
# =============================================================================

# --- Backend ---
backend = "glx";
glx-no-stencil = true;
glx-copy-from-front = false;

# --- VSync ---
# Prevents screen tearing. Disable if you notice input lag.
vsync = true;

# --- Shadows ---
shadow = true;
shadow-radius = 12;
shadow-offset-x = -5;
shadow-offset-y = -5;
shadow-opacity = 0.35;

# Exclude shadows on special windows
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g ?= 'Notify-osd'",
    "class_g = 'Cairo-clock'",
    "class_g = 'Polybar'",
    "class_g = 'slop'",
    "class_g = 'Rofi'",
    "_GTK_FRAME_EXTENTS@:c",
    "_NET_WM_STATE@:32a *= '_NET_WM_STATE_HIDDEN'"
];

# --- Fading ---
fading = true;
fade-in-step = 0.04;
fade-out-step = 0.04;
fade-delta = 5;

# Don't fade on workspace switch (avoids visual lag)
no-fading-openclose = false;

fade-exclude = [
    "class_g = 'slop'"
];

# --- Opacity / Transparency ---
# These rules allow per-app transparency (e.g., Alacritty's 0.85 opacity).
# Only override if you want picom-controlled transparency.
inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;

# App-specific opacity rules
# Format: "opacity:class_g = 'ClassName'"
opacity-rule = [
    # Uncomment to force transparency on specific apps:
    # "90:class_g = 'Alacritty'",
    # "95:class_g = 'Thunar'",
];

# --- Rounded Corners ---
corner-radius = 6;

rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'Polybar'",
    "class_g = 'Rofi'"
];

# --- Blur (disabled by default — performance cost) ---
# Uncomment for background blur behind transparent windows.
# Requires: picom with --experimental-backends or picom-git (AUR)
# blur-method = "dual_kawase";
# blur-strength = 5;
# blur-background-exclude = [
#     "window_type = 'dock'",
#     "window_type = 'desktop'",
#     "class_g = 'slop'",
#     "_GTK_FRAME_EXTENTS@:c"
# ];

# --- Focus ---
# Dim inactive windows slightly for visual focus cue
# Set to 0.0 to disable
inactive-dim = 0.0;

# Mark override-redirect windows (like Polybar) as focused
# so they don't get dimmed or de-shadowed
mark-ovredir-focused = true;
mark-wmwin-focused = true;

# --- Window Type Settings ---
wintypes:
{
    tooltip = { fade = true; shadow = true; opacity = 0.95; focus = true; full-shadow = false; };
    dock = { shadow = false; clip-shadow-above = true; };
    dnd = { shadow = false; };
    popup_menu = { opacity = 1.0; shadow = true; };
    dropdown_menu = { opacity = 1.0; shadow = true; };
};

# --- Misc ---
# Detect rounded corners and don't add borders/shadows there
detect-rounded-corners = true;

# Detect _NET_WM_OPACITY on client windows
detect-client-opacity = true;

# Use EWMH _NET_ACTIVE_WINDOW to determine focused window
use-ewmh-active-win = true;

# Unredirect all windows if a full-screen opaque window is detected
# (improves performance in fullscreen games/videos)
unredir-if-possible = true;

# Log level (change to "warn" or "info" for debugging)
log-level = "error";
