# =============================================================================
# Light Theme - Color Definitions
# =============================================================================
# Mirror of colors-dark.conf for light mode.
# Swap this in via the theme toggle script (Phase 10).
# =============================================================================

# --- Background & Foreground ---
set $bg          #eff1f5
set $bg_dark     #dce0e8
set $bg_light    #ccd0da
set $fg          #4c4f69
set $fg_dim      #6c6f85
set $fg_bright   #000000

# --- Accent Colors ---
set $accent      #1e66f5
set $accent_alt  #209fb5
set $urgent      #d20f39
set $warning     #fe640b
set $success     #40a02b

# --- Border & UI ---
set $border          #bcc0cc
set $border_focused  #1e66f5
set $border_urgent   #d20f39
