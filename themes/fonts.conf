# =============================================================================
# Font Definitions
# =============================================================================
# Centralized font settings used across i3, polybar, rofi, etc.
# Change fonts in ONE place.
# =============================================================================

# Primary UI font (window titles, bars)
set $font_family     JetBrains Mono
set $font_size       10

# i3 title bar font (used in i3 config directly)
set $i3_font         pango:JetBrains Mono 10

# Icon font (for polybar glyphs, etc.)
# Requires: nerd-fonts or font-awesome
set $icon_font       Font Awesome 6 Free
set $icon_font_size  12
