# =============================================================================
# Dark Theme - Color Definitions
# =============================================================================
# This file defines ALL colors used across the desktop environment.
# Every component (i3, polybar, rofi, dunst, alacritty) sources from here
# so you only change colors in ONE place.
#
# Format: i3 set directives — these are included directly into i3 config.
# Other tools parse these values via scripts or reference this as a single
# source of truth.
# =============================================================================

# --- Background & Foreground ---
set $bg          #1e1e2e
set $bg_dark     #11111b
set $bg_light    #313244
set $fg          #cdd6f4
set $fg_dim      #a6adc8
set $fg_bright   #ffffff

# --- Accent Colors ---
set $accent      #89b4fa
set $accent_alt  #74c7ec
set $urgent      #f38ba8
set $warning     #fab387
set $success     #a6e3a1

# --- Border & UI ---
set $border          #45475a
set $border_focused  #89b4fa
set $border_urgent   #f38ba8

# --- i3 Specific: Window Colors ---
# Format:  class               border            background   text         indicator        child_border
# These are used in appearance.conf via:
#   client.focused          $border_focused   $bg          $fg          $accent          $border_focused
#   client.focused_inactive $border           $bg_dark     $fg_dim      $bg_light        $border
#   client.unfocused        $border           $bg_dark     $fg_dim      $bg_light        $border
#   client.urgent           $border_urgent    $urgent      $fg_bright   $urgent          $border_urgent
