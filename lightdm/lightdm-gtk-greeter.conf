[greeter]
# Background image (replace with your own wallpaper path)
background = /usr/share/backgrounds/default.jpg

# Theme and icons
theme-name = Adwaita-dark
icon-theme-name = Adwaita
font-name = JetBrainsMono Nerd Font 11

# Catppuccin Mocha inspired panel
active-monitor = #cursor

# Clock format
clock-format = %a, %b %d  %H:%M

# User image
default-user-image = #icon

# Panel position
panel-position = bottom
