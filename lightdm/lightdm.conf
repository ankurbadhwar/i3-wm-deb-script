[LightDM]
# =============================================================================
# LightDM — Display Manager Configuration
# =============================================================================
# This file is deployed to /etc/lightdm/lightdm.conf by install.sh
# =============================================================================

# --- Seat Configuration ---
[Seat:*]
# Greeter to use (lightdm-gtk-greeter, lightdm-webkit2-greeter, etc.)
greeter-session=lightdm-gtk-greeter

# Default session for users (must match a .desktop in /usr/share/xsessions/)
user-session=i3

# --- Auto-login (disabled) ---
# Uncomment these two lines to enable auto-login:
# autologin-user=YOUR_USERNAME
# autologin-session=i3
