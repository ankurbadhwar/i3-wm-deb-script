# =============================================================================
# Autostart — i3 Window Manager
# =============================================================================
# Applications launched when i3 starts.
# exec = run once on login
# exec_always = run on every i3 reload/restart
#
# The autostart.sh script handles the actual startup logic
# to keep this file clean and the script independently testable.
# =============================================================================

# --- Core Desktop Services ---
# Compositor (transparency, animations, vsync)
exec_always --no-startup-id picom --config ~/.config/picom/picom.conf &

# Bar
exec_always --no-startup-id ~/.config/polybar/launch.sh

# Notification daemon
exec_always --no-startup-id dunst -config ~/.config/dunst/dunstrc &

# Daemon to auto-lock the screen on lid close or inactivity
exec --no-startup-id xss-lock --transfer-sleep-lock -- i3lock-color -c 1e1e2e &

# --- One-time Startup ---
exec --no-startup-id ~/.config/i3/scripts/autostart.sh
