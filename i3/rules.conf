# =============================================================================
# Window Rules — i3 Window Manager
# =============================================================================
# Assign applications to specific workspaces, set floating rules, etc.
# Use `xprop` to find WM_CLASS values for windows.
# =============================================================================

# --- Floating Windows ---
# Dialogs and pop-ups should always float
for_window [window_role="pop-up"]      floating enable
for_window [window_role="task_dialog"] floating enable
for_window [window_role="dialog"]      floating enable
for_window [window_type="dialog"]      floating enable
for_window [window_type="menu"]        floating enable

# Common floating apps
for_window [class="Pavucontrol"]       floating enable
for_window [class="Nm-connection-editor"] floating enable
for_window [class="Blueman-manager"]   floating enable
for_window [class="Lxappearance"]      floating enable
for_window [class="Arandr"]            floating enable
for_window [class="Gpick"]             floating enable

# Flameshot needs special handling
for_window [class="flameshot"]         floating enable

# --- Workspace Assignments ---
# Uncomment and customize:
# assign [class="Firefox"]     $ws2
# assign [class="Thunar"]      $ws3
