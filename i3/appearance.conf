# =============================================================================
# Appearance — i3 Window Manager
# =============================================================================
# Visual settings: gaps, borders, fonts, window colors.
# Colors come from the included theme file (colors-dark.conf or colors-light.conf).
# =============================================================================

# --- Font ---
font $i3_font

# --- Borders ---
# "pixel N" = N-pixel border, no title bar (clean look)
default_border pixel 2
default_floating_border pixel 2

# Hide borders when there's only one window on screen
hide_edge_borders smart

# --- Gaps (requires i3-gaps) ---
# If you're on stock i3 without gaps support, comment these out.
# i3 4.22+ has built-in gaps support.
gaps inner 8
gaps outer 4

# Only show gaps when there are multiple windows
smart_gaps on

# --- Window Colors ---
# class                  border            background   text         indicator        child_border
client.focused           $border_focused   $bg          $fg          $accent          $border_focused
client.focused_inactive  $border           $bg_dark     $fg_dim      $bg_light        $border
client.unfocused         $border           $bg_dark     $fg_dim      $bg_light        $border
client.urgent            $border_urgent    $urgent      $fg_bright   $urgent          $border_urgent
client.placeholder       $border           $bg_dark     $fg_dim      $bg_light        $border
client.background        $bg
