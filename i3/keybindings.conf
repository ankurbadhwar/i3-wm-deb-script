# =============================================================================
# Keybindings — i3 Window Manager
# =============================================================================
# Mod key = Super (Mod4). Arrow keys for navigation.
# This file is included from the main i3 config.
#
# Sections:
#   1. Core / Window Management
#   2. Workspace Navigation
#   3. Layout
#   4. Application Launchers
#   5. System / Utility
# =============================================================================

# --- 1. Core / Window Management ---

# Change focus (arrow keys)
bindsym $mod+Left  focus left
bindsym $mod+Down  focus down
bindsym $mod+Up    focus up
bindsym $mod+Right focus right

# Move focused window (arrow keys)
bindsym $mod+Shift+Left  move left
bindsym $mod+Shift+Down  move down
bindsym $mod+Shift+Up    move up
bindsym $mod+Shift+Right move right

# Kill focused window
bindsym $mod+q kill

# Toggle fullscreen
bindsym $mod+f fullscreen toggle

# Toggle floating
#bindsym $mod+Shift+space floating toggle

# Change focus between tiling / floating
#bindsym $mod+space focus mode_toggle

# Focus parent container
#bindsym $mod+a focus parent

# --- 2. Workspace Navigation ---
# (Workspace names defined in workspaces.conf)

bindsym $mod+1 workspace number $ws1
bindsym $mod+2 workspace number $ws2
bindsym $mod+3 workspace number $ws3
bindsym $mod+4 workspace number $ws4
bindsym $mod+5 workspace number $ws5
bindsym $mod+6 workspace number $ws6
bindsym $mod+7 workspace number $ws7
bindsym $mod+8 workspace number $ws8
bindsym $mod+9 workspace number $ws9
bindsym $mod+0 workspace number $ws10

# Move container to workspace
bindsym $mod+Shift+1 move container to workspace number $ws1
bindsym $mod+Shift+2 move container to workspace number $ws2
bindsym $mod+Shift+3 move container to workspace number $ws3
bindsym $mod+Shift+4 move container to workspace number $ws4
bindsym $mod+Shift+5 move container to workspace number $ws5
bindsym $mod+Shift+6 move container to workspace number $ws6
bindsym $mod+Shift+7 move container to workspace number $ws7
bindsym $mod+Shift+8 move container to workspace number $ws8
bindsym $mod+Shift+9 move container to workspace number $ws9
bindsym $mod+Shift+0 move container to workspace number $ws10

# --- 3. Layout ---

# Split orientation
bindsym $mod+h split h
bindsym $mod+v split v

# Layout mode toggles
#bindsym $mod+s layout stacking
#bindsym $mod+w layout tabbed
#bindsym $mod+e layout toggle split

# Resize mode
mode "resize" {
    bindsym Left  resize shrink width  5 px or 5 ppt
    bindsym Down  resize grow   height 5 px or 5 ppt
    bindsym Up    resize shrink height 5 px or 5 ppt
    bindsym Right resize grow   width  5 px or 5 ppt

    # Exit resize mode
    bindsym Return mode "default"
    bindsym Escape mode "default"
    bindsym $mod+r mode "default"
}
bindsym $mod+r mode "resize"

# --- 4. Application Launchers ---

# Terminal (Alacritty with xterm fallback)
bindsym $mod+Return exec --no-startup-id alacritty || xterm

# Application launcher (Rofi)
bindsym $mod+space exec --no-startup-id rofi -show drun -show-icons -icon-theme Papirus -theme ~/.config/rofi/config.rasi

# File manager
bindsym $mod+e exec --no-startup-id thunar

# --- 5. System / Utility ---

# Reload i3 config
bindsym $mod+Shift+c reload

# Restart i3 in-place (preserves layout)
bindsym $mod+Shift+r restart

# Power menu (via script — created in Phase 3)
bindsym $mod+Shift+e exec --no-startup-id ~/.config/i3/scripts/power_menu.sh

# Lock screen
bindsym $mod+l exec --no-startup-id i3lock-color -c 1e1e2e

# Screenshot (Flameshot — created in Phase 3)
bindsym Print exec --no-startup-id flameshot gui

# Volume controls (via script — created in Phase 3)
bindsym XF86AudioRaiseVolume exec --no-startup-id ~/.config/i3/scripts/volume.sh up
bindsym XF86AudioLowerVolume exec --no-startup-id ~/.config/i3/scripts/volume.sh down
bindsym XF86AudioMute        exec --no-startup-id ~/.config/i3/scripts/volume.sh mute
bindsym XF86AudioMicMute     exec --no-startup-id pactl set-source-mute @DEFAULT_SOURCE@ toggle

# Media controls (playerctl)
bindsym XF86AudioPlay        exec --no-startup-id playerctl play-pause
bindsym XF86AudioNext        exec --no-startup-id playerctl next
bindsym XF86AudioPrev        exec --no-startup-id playerctl previous

# Brightness controls (via script — created in Phase 3)
bindsym XF86MonBrightnessUp   exec --no-startup-id ~/.config/i3/scripts/brightness.sh up
bindsym XF86MonBrightnessDown exec --no-startup-id ~/.config/i3/scripts/brightness.sh down

# =============================================================================
# SAFETY FALLBACK: In case primary terminal is missing
# =============================================================================
bindsym $mod+Shift+Return exec --no-startup-id xterm
