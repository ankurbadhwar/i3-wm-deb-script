; =============================================================================
; Polybar — Main Configuration
; =============================================================================
; Position: Top bar
; Theme:    Catppuccin Mocha
;
; Module layout:
;   LEFT:   i3 workspaces
;   CENTER: date & time
;   RIGHT:  pulseaudio | battery | cpu | memory | network
; =============================================================================

[colors]
background     = #1e1e2e
background-alt = #313244
foreground     = #cdd6f4
foreground-dim = #bac2de
primary        = #8caaee
alert          = #f38ba8
green          = #a6e3a1
yellow         = #f9e2af
peach          = #fab387
border         = #45475a

; =============================================================================
; BAR
; =============================================================================
[bar/main]
; Position & size
bottom   = false
width    = 100%
height   = 32pt
offset-x = 0
offset-y = 0
radius   = 0

; Colors
background = ${colors.background}
foreground = ${colors.foreground}

; Border
border-size  = 0
border-color = ${colors.border}

; Padding & margins
padding-left  = 1
padding-right = 1
module-margin = 1

; Underline
line-size  = 2
line-color = ${colors.primary}

; Fonts
; Font-0: main text, Font-1: icons (Nerd Font)
font-0 = "JetBrainsMono Nerd Font:size=10;2"
font-1 = "JetBrainsMono Nerd Font:size=12;3"

; System tray
tray-position   = right
tray-padding    = 4
tray-background = ${colors.background}

; Module layout
modules-left   = i3
modules-center = date
modules-right  = pulseaudio sep battery sep cpu sep memory sep network

; Cursor actions
cursor-click  = pointer
cursor-scroll = ns-resize

; WM
wm-restack = i3
override-redirect = false

; =============================================================================
; MODULES
; =============================================================================

; --- Separator ---
[module/sep]
type = custom/text
content = " │ "
content-foreground = ${colors.border}

; --- i3 Workspaces ---
[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent    = true
strip-wsnumbers = true
index-sort     = true

; Labels
label-focused            = %name%
label-focused-background = ${colors.background-alt}
label-focused-underline  = ${colors.primary}
label-focused-padding    = 2

label-unfocused         = %name%
label-unfocused-padding = 2

label-visible         = %name%
label-visible-padding = 2

label-urgent            = %name%
label-urgent-background = ${colors.alert}
label-urgent-foreground = ${colors.background}
label-urgent-padding    = 2

; --- Date & Time ---
[module/date]
type     = internal/date
interval = 1

date     = %a, %b %d
time     = %H:%M

label            = "  %date%    %time%"
label-foreground = ${colors.foreground}

; --- PulseAudio ---
[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = true

format-volume = <ramp-volume> <label-volume>
label-volume  = %percentage%%

format-muted-foreground = ${colors.foreground-dim}
label-muted             = "  muted"

ramp-volume-0 = " "
ramp-volume-1 = " "
ramp-volume-2 = " "

click-right = pavucontrol

; --- Battery ---
[module/battery]
type    = internal/battery
; Auto-detect — override these if your device uses different names
; Check: ls /sys/class/power_supply/
battery = BAT0
adapter = AC

; Update intervals
poll-interval = 5

; Charging
format-charging         = <animation-charging> <label-charging>
label-charging          = %percentage%%
label-charging-foreground = ${colors.green}

animation-charging-0 = " "
animation-charging-1 = " "
animation-charging-2 = " "
animation-charging-3 = " "
animation-charging-4 = " "
animation-charging-framerate = 750

; Discharging
format-discharging = <ramp-capacity> <label-discharging>
label-discharging  = %percentage%%

ramp-capacity-0 = " "
ramp-capacity-0-foreground = ${colors.alert}
ramp-capacity-1 = " "
ramp-capacity-1-foreground = ${colors.peach}
ramp-capacity-2 = " "
ramp-capacity-2-foreground = ${colors.yellow}
ramp-capacity-3 = " "
ramp-capacity-3-foreground = ${colors.green}
ramp-capacity-4 = " "
ramp-capacity-4-foreground = ${colors.green}

; Full
format-full        = <label-full>
label-full         = "  %percentage%%"
label-full-foreground = ${colors.green}

; Low battery warning
format-low         = <ramp-capacity> <label-low>
label-low          = "%percentage%% LOW"
label-low-foreground = ${colors.alert}
low-at = 15

; --- CPU ---
[module/cpu]
type     = internal/cpu
interval = 2

format         = <label>
label          = "  %percentage:2%%"

; --- Memory ---
[module/memory]
type     = internal/memory
interval = 3

format = <label>
label  = "  %used%"

; --- Network ---
[module/network]
type      = internal/network
; Change this to your interface (check: ip link)
interface-type = wireless
interval  = 3

; Connected
format-connected = <label-connected>
label-connected  = "  %essid%"

; Disconnected
format-disconnected            = <label-disconnected>
label-disconnected             = "  offline"
label-disconnected-foreground  = ${colors.foreground-dim}

; =============================================================================
; Global WM settings
; =============================================================================
[settings]
screenchange-reload = true

[global/wm]
margin-top    = 0
margin-bottom = 0
